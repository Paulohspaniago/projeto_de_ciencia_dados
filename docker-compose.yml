services:
  mongo-service:
    image: mongo:7
    container_name: mongo-service
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./db-seed:/docker-entrypoint-initdb.d

  mongo-express-service:
    image: mongo-express:1.0.2-20
    container_name: mongo-express-service
    restart: unless-stopped
    depends_on:
      - mongo-service
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo-service
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

  jupyter-service:
    image: jupyter/scipy-notebook:python-3.11
    container_name: jupyter-service
    restart: unless-stopped
    depends_on:
      - mongo-service
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: crime123
    volumes:
      - ./datasets:/home/jovyan/work/datasets
      - ./notebooks:/home/jovyan/work/notebooks
      - ./db-seed:/home/jovyan/work/db-seed
      - ./README.md:/home/jovyan/work/README.md:ro
    working_dir: /home/jovyan/work

  metabase-service:
    image: metabase/metabase:latest
    container_name: metabase-service
    restart: unless-stopped
    depends_on:
      - mongo-service
    ports:
      - "3000:3000"
    volumes:
      - ./metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  mongodb_data:
